<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:;">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <link rel="stylesheet" href="../Style.css">
    <script src="../Script.js" defer></script>
</head>
<body>
    <main class="app-shell">
        <section class="hero">
            <p class="eyebrow">Safari Companion App</p>
            <h1>YouTube Timestamps and Summaries</h1>
        </section>

        <section class="panel checklist-panel">
            <p class="section-label">Checklist</p>
            <ol id="checklist" class="checklist">
                <li>Loading setup steps…</li>
            </ol>
        </section>

        <section class="panel status-panel">
            <div>
                <p class="section-label">Generation Setup</p>
                <label class="field compact-field">
                    <span>Provider</span>
                    <select id="provider-select"></select>
                </label>
                <label class="field compact-field">
                    <span>Timestamps model</span>
                    <select id="model-select"></select>
                </label>
                <label class="field compact-field">
                    <span>Summary model</span>
                    <select id="summary-select"></select>
                </label>
            </div>
        </section>

        <section class="panel status-panel">
            <div>
                <p class="section-label">ChatGPT Login</p>
                <p id="codex-status" class="connection-status">Checking ChatGPT…</p>
                <div id="codex-pairing" class="pairing-panel" hidden>
                    <p class="hint">Enter this code on the ChatGPT sign-in page:</p>
                    <div class="pairing-code-row">
                        <p id="codex-code" class="pairing-code"></p>
                        <button id="copy-codex-code" class="secondary compact-button" type="button">Copy</button>
                    </div>
                </div>
            </div>
            <div class="button-stack">
                <button id="codex-sign-in" class="primary">Sign in with ChatGPT</button>
                <button id="codex-sign-out" class="secondary">Sign Out</button>
            </div>
        </section>

        <section class="panel status-panel">
            <div>
                <p class="section-label">Extension Status</p>
                <p id="extension-status" class="status-line">Checking Safari extension status…</p>
            </div>
            <button id="open-preferences" class="secondary">Open Safari Extension Settings</button>
        </section>

        <p id="message" class="flash-message" hidden></p>
    </main>
</body>
</html>
